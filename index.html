<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sharks CRM</title>
<style>
body {
    font-family: Arial, sans-serif;
    margin: 0;
    background: #f1f1f1;
}

/* Логин */
#loginPage {
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}
.login-box {
    background: white;
    padding: 40px;
    border-radius: 8px;
    box-shadow: 0 0 15px rgba(0,0,0,0.2);
    text-align: center;
}
.login-box input {
    width: 100%;
    padding: 10px;
    margin: 10px 0;
}
.login-box button {
    width: 100%;
    padding: 10px;
    background: #007bff;
    color: white;
    border: none;
    cursor: pointer;
}

/* CRM */
#crmPage {
    display: none;
}

header {
    background: #1e90ff;
    color: white;
    padding: 10px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
}

header .logo {
    font-weight: bold;
    font-size: 20px;
}

.container {
    display: flex;
    padding: 20px;
    gap: 20px;
}

/* Левая панель */
.sidebar {
    width: 250px;
    background: white;
    padding: 10px;
    border-radius: 8px;
}
.sidebar .manager {
    text-align: center;
}
.sidebar .manager img {
    width: 80px;
    height: 80px;
    border-radius: 50%;
    background: #ccc;
}
.sidebar .calendar, .sidebar .top-managers {
    margin-top: 20px;
}

/* Основная панель */
.main {
    flex: 1;
    background: white;
    padding: 20px;
    border-radius: 8px;
}
.status-buttons button {
    margin: 5px;
    padding: 10px 15px;
    border: none;
    color: white;
    cursor: pointer;
    border-radius: 5px;
}
.status-buttons .delete { background: #e91e63; }
.status-buttons .skip30 { background: #ffeb3b; color:black; }
.status-buttons .call { background: #4caf50; }

/* Правая панель */
.right-panel {
    width: 250px;
    background: white;
    padding: 10px;
    border-radius: 8px;
}

/* Общие стили кнопок звонка */
.call-buttons button {
    margin: 5px;
    padding: 10px;
    border-radius: 5px;
    cursor: pointer;
}
.call-buttons .phone { background: #2196f3; color:white; }
.call-buttons .whatsapp { background: #25d366; color:white; }
.call-buttons .telegram { background: #0088cc; color:white; }

</style>
</head>
<body>

<!-- Логин -->
<div id="loginPage">
    <div class="login-box">
        <img src="" alt="Shark" style="width:40px; margin-bottom:10px;">
        <h2>Sharks CRM</h2>
        <input type="text" id="login" placeholder="Логин *">
        <input type="password" id="password" placeholder="Пароль *">
        <button onclick="login()">ВХОД</button>
    </div>
</div>

<!-- CRM -->
<div id="crmPage">
<header>
    <div class="logo">Sharks</div>
    <div>
        <span id="coins">5850</span> 🪙
        <button onclick="logout()">Выйти</button>
    </div>
</header>

<div class="container">
    <!-- Левая панель -->
    <div class="sidebar">
        <div class="manager">
            <img src="" alt="avatar">
            <h3>Кевин</h3>
            <p>(Менеджер)</p>
        </div>
        <div class="calendar">
            <h4>Март 2026</h4>
            <input type="date" id="datePicker">
        </div>
        <div class="top-managers">
            <h4>Топ менеджеров</h4>
            <ul id="topManagers">
                <li>[Спарта] ВискаС - 4 звонка</li>
                <li>[Спарта] Даркнет - 4 звонка</li>
            </ul>
        </div>
    </div>

    <!-- Основная панель -->
    <div class="main">
        <div class="call-buttons">
            <button class="phone" onclick="call('phone')">📞 Звонок</button>
            <button class="whatsapp" onclick="call('whatsapp')">WhatsApp</button>
            <button class="telegram" onclick="call('telegram')">Telegram</button>
        </div>
        <div>
            <label>Звоню от:</label>
            <select id="callFrom">
                <option>Выбрать спич</option>
                <option>Менеджер 1</option>
            </select>
        </div>
        <div>
            <input type="text" id="phoneInput" placeholder="Телефон">
        </div>
        <div class="status-buttons">
            <button class="delete" onclick="setStatus('Удалить')">УДАЛИТЬ</button>
            <button class="skip30" onclick="setStatus('СКИП ДО 30')">СКИП ДО 30</button>
            <button class="call" onclick="setStatus('ПЕРЕЗВОН')">ПЕРЕЗВОН</button>
        </div>
    </div>

    <!-- Правая панель -->
    <div class="right-panel">
        <h4>Уровень 1</h4>
        <progress value="222" max="300"></progress>
        <h4>Передачи холдке</h4>
        <p>Передач пока нет</p>
        <h4>Задания</h4>
        <ul>
            <li>Войти первым в CRM</li>
            <li>Передать трубку</li>
        </ul>
    </div>
</div>
</div>

<script>
function login() {
    const loginVal = document.getElementById('login').value;
    const passVal = document.getElementById('password').value;
    if(loginVal && passVal) {
        document.getElementById('loginPage').style.display = 'none';
        document.getElementById('crmPage').style.display = 'block';
    } else {
        alert('Введите логин и пароль');
    }
}

function logout() {
    document.getElementById('crmPage').style.display = 'none';
    document.getElementById('loginPage').style.display = 'flex';
}

function call(type) {
    alert('Звонок через ' + type);
}

function setStatus(status) {
    alert('Статус изменен на: ' + status);
}
</script>

</body>
</html>
