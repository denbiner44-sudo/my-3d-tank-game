<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Hamster GameDev</title>

<style>

body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#1e1b4b,#312e81);
color:white;
text-align:center;
}

header{
background:#111827;
padding:15px;
font-size:26px;
font-weight:bold;
}

.container{
padding:20px;
}

.hamster{
font-size:90px;
cursor:pointer;
transition:0.1s;
}

.hamster:active{
transform:scale(0.9);
}

.money{
font-size:28px;
margin:10px;
}

.panel{
background:#1f2937;
padding:15px;
margin:10px auto;
width:320px;
border-radius:10px;
}

button{
padding:10px 15px;
border:none;
border-radius:8px;
background:#22c55e;
color:white;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#16a34a;
}

.shop button{
margin-top:10px;
width:100%;
}

</style>
</head>

<body>

<header>
🐹 Hamster GameDev
</header>

<div class="container">

<div class="money">
💰 Деньги: <span id="money">0</span>
</div>

<div class="hamster" onclick="clickHamster()">
🐹
</div>

<div>
Кликай чтобы писать код
</div>

<div class="panel">
<h3>🎮 Разработка игр</h3>

<button onclick="createGame()">
Создать игру ($50)
</button>

<p>Прибыль: <span id="income">0</span> / сек</p>
</div>

<div class="panel shop">

<h3>🏢 Апгрейды студии</h3>

<button onclick="buyDev()">
👨‍💻 Нанять разработчика ($200)
</button>

<button onclick="buyMarketing()">
📢 Маркетинг ($500)
</button>

<button onclick="buyStudio()">
🏢 Новая студия ($1500)
</button>

</div>

</div>

<script>

let money = 0
let income = 0

let devs = 0
let marketing = 0
let studios = 1

function updateUI(){
document.getElementById("money").innerText = Math.floor(money)
document.getElementById("income").innerText = income
}

function clickHamster(){
money += 1 + devs
updateUI()
save()
}

function createGame(){

if(money >= 50){

money -= 50

let profit = 5 + devs*2 + marketing*3 + studios*5

income += profit

updateUI()
save()

}else{
alert("Недостаточно денег")
}

}

function buyDev(){

if(money >= 200){

money -= 200
devs++

updateUI()
save()

}

}

function buyMarketing(){

if(money >= 500){

money -= 500
marketing++

updateUI()
save()

}

}

function buyStudio(){

if(money >= 1500){

money -= 1500
studios++
income += 10

updateUI()
save()

}

}

setInterval(()=>{

money += income
updateUI()

},1000)

function save(){

localStorage.setItem("hamster_money",money)
localStorage.setItem("hamster_income",income)
localStorage.setItem("hamster_devs",devs)
localStorage.setItem("hamster_marketing",marketing)
localStorage.setItem("hamster_studios",studios)

}

function load(){

money = Number(localStorage.getItem("hamster_money")) || 0
income = Number(localStorage.getItem("hamster_income")) || 0
devs = Number(localStorage.getItem("hamster_devs")) || 0
marketing = Number(localStorage.getItem("hamster_marketing")) || 0
studios = Number(localStorage.getItem("hamster_studios")) || 1

updateUI()

}

load()

</script>

</body>
</html>
