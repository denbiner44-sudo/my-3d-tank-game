<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>MEGA TYCOON CLICKER</title>

<style>
:root{
--bg:#1e1e2f;
--panel:#2a2a40;
--accent:#ffb703;
--green:#4caf50;
--red:#ff5252;
--blue:#42a5f5;
}
body{
margin:0;
background:linear-gradient(180deg,#1e1e2f,#25253b);
font-family:Arial;
color:white;
}
.topbar{
display:flex;
justify-content:space-around;
padding:10px;
background:#111827;
font-weight:bold;
}
.tabs{
display:flex;
overflow:auto;
background:#181825;
}
.tab{
flex:1;
padding:10px;
text-align:center;
cursor:pointer;
background:#222;
}
.tab.active{
background:var(--accent);
color:black;
font-weight:bold;
}
.panel{
padding:15px;
display:none;
}
.panel.active{display:block;}
.card{
background:var(--panel);
padding:10px;
margin:8px 0;
border-radius:10px;
box-shadow:0 4px 10px rgba(0,0,0,0.4);
}
button{
width:100%;
padding:8px;
margin-top:6px;
border:none;
border-radius:8px;
cursor:pointer;
font-weight:bold;
}
.buy{background:var(--green);}
.danger{background:var(--red);}
.blue{background:var(--blue);}
#clickBtn{
height:60px;
font-size:18px;
background:linear-gradient(180deg,#ffb703,#fb8500);
}
</style>
</head>
<body>

<div class="topbar">
<div>💰 $<span id="money">0</span></div>
<div>🏦 $<span id="bank">0</span></div>
<div>⭐ <span id="level">1</span></div>
<div>⚡ x<span id="mult">1</span></div>
</div>

<div class="tabs">
<div class="tab active" onclick="openTab(0)">💼 Работа</div>
<div class="tab" onclick="openTab(1)">🏪 Рынки</div>
<div class="tab" onclick="openTab(2)">🚗 Авто</div>
<div class="tab" onclick="openTab(3)">🛢 Нефть</div>
<div class="tab" onclick="openTab(4)">💻 Крипта</div>
<div class="tab" onclick="openTab(5)">🏦 Банк</div>
</div>

<div class="panel active" id="tab0">
<button id="clickBtn">РАБОТАТЬ 💸</button>
</div>

<div class="panel" id="tab1"></div>
<div class="panel" id="tab2"></div>
<div class="panel" id="tab3"></div>
<div class="panel" id="tab4"></div>

<div class="panel" id="tab5">
<input type="number" id="bankInput" placeholder="Сумма">
<button class="buy" onclick="deposit()">Внести</button>
<button class="danger" onclick="withdraw()">Снять</button>
</div>

<script>
let g={
money:1000,
bank:0,
level:1,
xp:0,
mult:1,

markets:[
{name:"Фруктовая лавка",cost:500,inc:5,owned:0},
{name:"Мясной магазин",cost:2000,inc:25,owned:0},
{name:"Супермаркет",cost:8000,inc:100,owned:0},
{name:"Торговый центр",cost:30000,inc:450,owned:0},
{name:"Оптовый склад",cost:90000,inc:1200,owned:0},
{name:"Международная сеть",cost:250000,inc:3500,owned:0}
],

auto:[
{name:"Гараж",cost:1500,inc:15,owned:0},
{name:"Автомойка",cost:5000,inc:60,owned:0},
{name:"СТО",cost:15000,inc:200,owned:0},
{name:"Дилерский центр",cost:60000,inc:800,owned:0},
{name:"Автозавод",cost:200000,inc:2500,owned:0},
{name:"Автоимперия",cost:700000,inc:7000,owned:0}
],

oil:[
{name:"Малая скважина",cost:10000,inc:120,owned:0},
{name:"Нефтяная вышка",cost:40000,inc:500,owned:0},
{name:"НПЗ",cost:120000,inc:1600,owned:0},
{name:"Нефтяное поле",cost:400000,inc:4500,owned:0},
{name:"Экспортная компания",cost:1200000,inc:12000,owned:0},
{name:"Нефтяная корпорация",cost:5000000,inc:35000,owned:0}
],

crypto:[
{name:"GPU ферма",cost:8000,inc:90,owned:0},
{name:"ASIC ферма",cost:30000,inc:400,owned:0},
{name:"Криптобиржа",cost:100000,inc:1500,owned:0},
{name:"DeFi платформа",cost:300000,inc:4200,owned:0},
{name:"Международная биржа",cost:1000000,inc:11000,owned:0},
{name:"Блокчейн корпорация",cost:4000000,inc:30000,owned:0}
]
};

function updateTop(){
money.innerText=g.money.toFixed(1);
bank.innerText=g.bank.toFixed(1);
level.innerText=g.level;
mult.innerText=g.mult.toFixed(2);
}

function openTab(i){
document.querySelectorAll(".tab").forEach((t,idx)=>t.classList.toggle("active",idx==i));
document.querySelectorAll(".panel").forEach((p,idx)=>p.classList.toggle("active",idx==i));
}

function renderCategory(arr,container){
let html="";
arr.forEach((b,i)=>{
html+=`
<div class="card">
<b>${b.name}</b><br>
Владение: ${b.owned}<br>
Доход: $${b.inc}/с<br>
<button class="buy" onclick="buy('${container}',${i})">
Купить ($${Math.floor(b.cost)})
</button>
</div>`;
});
document.getElementById(container).innerHTML=html;
}

function buy(cat,i){
let b=g[cat][i];
if(g.money>=b.cost){
g.money-=b.cost;
b.owned++;
b.cost*=1.5;
}
}

function deposit(){
let v=parseFloat(bankInput.value);
if(v>0 && g.money>=v){
g.money-=v;
g.bank+=v;
}
}

function withdraw(){
let v=parseFloat(bankInput.value);
if(v>0 && g.bank>=v){
g.bank-=v;
g.money+=v;
}
}

clickBtn.onclick=()=>{
g.money+=1*g.mult;
g.xp++;
};

function levelCheck(){
if(g.xp>=100*g.level){
g.xp=0;
g.level++;
g.mult+=0.2;
}
}

setInterval(()=>{
let total=0;
["markets","auto","oil","crypto"].forEach(cat=>{
g[cat].forEach(b=>{
total+=b.owned*b.inc;
});
});
g.money+=total*0.1*g.mult;
g.bank+=g.bank*0.002;
levelCheck();
updateTop();
},100);

function renderAll(){
renderCategory(g.markets,"tab1");
renderCategory(g.auto,"tab2");
renderCategory(g.oil,"tab3");
renderCategory(g.crypto,"tab4");
updateTop();
}
renderAll();
</script>

</body>
</html>
