<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2048 с уровнями и рекордами (жесты)</title>
<style>
    body {
        font-family: Arial, sans-serif;
        background: #f2f2f2;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
    }
    .game-container {
        background: #bbada0;
        padding: 20px;
        border-radius: 10px;
        position: relative;
        user-select: none;
        touch-action: none;
    }
    .scoreboard {
        display: flex;
        justify-content: space-between;
        margin-bottom: 10px;
    }
    .scoreboard div {
        background: #eee4da;
        padding: 10px 20px;
        border-radius: 5px;
        font-weight: bold;
    }
    .grid {
        display: grid;
        grid-template-columns: repeat(4, 80px);
        grid-template-rows: repeat(4, 80px);
        gap: 10px;
        background: #bbada0;
        padding: 10px;
        border-radius: 10px;
    }
    .cell {
        width: 80px;
        height: 80px;
        background: #cdc1b4;
        display: flex;
        justify-content: center;
        align-items: center;
        font-size: 24px;
        font-weight: bold;
        border-radius: 5px;
        color: #776e65;
    }
    .cell-2 { background: #eee4da; }
    .cell-4 { background: #ede0c8; }
    .cell-8 { background: #f2b179; color: #f9f6f2;}
    .cell-16 { background: #f59563; color: #f9f6f2;}
    .cell-32 { background: #f67c5f; color: #f9f6f2;}
    .cell-64 { background: #f65e3b; color: #f9f6f2;}
    .cell-128 { background: #edcf72; color: #f9f6f2;}
    .cell-256 { background: #edcc61; color: #f9f6f2;}
    .cell-512 { background: #edc850; color: #f9f6f2;}
    .cell-1024 { background: #edc53f; color: #f9f6f2;}
    .cell-2048 { background: #edc22e; color: #f9f6f2;}
</style>
</head>
<body>
<div class="game-container" id="gameContainer">
    <div class="scoreboard">
        <div>Счет: <span id="score">0</span></div>
        <div>Рекорд: <span id="best">0</span></div>
        <div>Уровень: <span id="level">1</span></div>
    </div>
    <div class="grid" id="grid"></div>
</div>

<script>
const gridSize = 4;
let grid = [];
let score = 0;
let level = 1;
let best = localStorage.getItem('bestScore') || 0;

const gridContainer = document.getElementById('grid');
const scoreDisplay = document.getElementById('score');
const bestDisplay = document.getElementById('best');
const levelDisplay = document.getElementById('level');

bestDisplay.textContent = best;

function initGrid() {
    grid = Array(gridSize).fill(null).map(() => Array(gridSize).fill(0));
    addRandom();
    addRandom();
    drawGrid();
}

function drawGrid() {
    gridContainer.innerHTML = '';
    for (let r = 0; r < gridSize; r++) {
        for (let c = 0; c < gridSize; c++) {
            const cell = document.createElement('div');
            cell.classList.add('cell');
            if (grid[r][c] !== 0) {
                cell.textContent = grid[r][c];
                cell.classList.add(`cell-${grid[r][c]}`);
            }
            gridContainer.appendChild(cell);
        }
    }
    scoreDisplay.textContent = score;
    bestDisplay.textContent = best;
    levelDisplay.textContent = level;
}

function addRandom() {
    let empty = [];
    for (let r = 0; r < gridSize; r++) {
        for (let c = 0; c < gridSize; c++) {
            if (grid[r][c] === 0) empty.push({r, c});
        }
    }
    if (empty.length === 0) return;
    const {r, c} = empty[Math.floor(Math.random() * empty.length)];
    grid[r][c] = Math.random() < 0.9 ? 2 : 4;
}

function rotateGrid() {
    grid = grid[0].map((_, i) => grid.map(row => row[i]).reverse());
}

function move(direction) {
    let moved = false;
    for (let i = 0; i < direction; i++) rotateGrid();
    for (let r = 0; r < gridSize; r++) {
        let row = grid[r].filter(n => n);
        for (let c = 0; c < row.length - 1; c++) {
            if (row[c] === row[c+1]) {
                row[c] *= 2;
                score += row[c];
                if (row[c] > 2048) levelUp();
                row[c+1] = 0;
            }
        }
        row = row.filter(n => n);
        while (row.length < gridSize) row.push(0);
        if (grid[r].some((val, idx) => val !== row[idx])) moved = true;
        grid[r] = row;
    }
    for (let i = 0; i < (4 - direction) % 4; i++) rotateGrid();
    if (moved) {
        addRandom();
        if (score > best) {
            best = score;
            localStorage.setItem('bestScore', best);
        }
        drawGrid();
        if (isGameOver()) alert('Игра окончена!');
    }
}

function levelUp() {
    level = Math.floor(score / 2048) + 1;
}

function isGameOver() {
    for (let r = 0; r < gridSize; r++) {
        for (let c = 0; c < gridSize; c++) {
            if (grid[r][c] === 0) return false;
            if (c < gridSize - 1 && grid[r][c] === grid[r][c+1]) return false;
            if (r < gridSize - 1 && grid[r][c] === grid[r+1][c]) return false;
        }
    }
    return true;
}

// === Управление жестами ===
let startX = 0, startY = 0;

const container = document.getElementById('gameContainer');

container.addEventListener('mousedown', (e) => {
    startX = e.clientX;
    startY = e.clientY;
});

container.addEventListener('mouseup', (e) => {
    const dx = e.clientX - startX;
    const dy = e.clientY - startY;
    handleSwipe(dx, dy);
});

container.addEventListener('touchstart', (e) => {
    startX = e.touches[0].clientX;
    startY = e.touches[0].clientY;
});

container.addEventListener('touchend', (e) => {
    const endX = e.changedTouches[0].clientX;
    const endY = e.changedTouches[0].clientY;
    const dx = endX - startX;
    const dy = endY - startY;
    handleSwipe(dx, dy);
});

function handleSwipe(dx, dy) {
    if (Math.abs(dx) > Math.abs(dy)) {
        if (dx > 20) move(1); // вправо
        else if (dx < -20) move(3); // влево
    } else {
        if (dy > 20) move(2); // вниз
        else if (dy < -20) move(0); // вверх
    }
}

initGrid();
</script>
</body>
</html>
