<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Вопрос 😄</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #111;
    color: #fff;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

.container {
    text-align: center;
    background: #1f1f1f;
    padding: 40px;
    border-radius: 12px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.5);
}

h1 {
    margin-bottom: 30px;
}

.buttons {
    position: relative;
    height: 150px;
}

button {
    padding: 15px 30px;
    font-size: 18px;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    transition: 0.2s;
}

#yes {
    background: #22c55e;
    color: white;
    margin-right: 20px;
}

#yes:hover {
    background: #16a34a;
}

#no {
    background: #ef4444;
    color: white;
    position: absolute;
    left: 60%;
    top: 50%;
}

#result {
    margin-top: 25px;
    font-size: 20px;
    color: #22c55e;
}
</style>

</head>
<body>

<div class="container">
    <h1>Сосал?</h1>

    <div class="buttons">
        <button id="yes">Да</button>
        <button id="no">Нет</button>
    </div>

    <div id="result"></div>
</div>

<script>
const yesBtn = document.getElementById("yes");
const noBtn = document.getElementById("no");
const result = document.getElementById("result");

// Ответ при нажатии "Да"
yesBtn.addEventListener("click", () => {
    result.textContent = "Ну ты приколист 😄";
});

// Убегающая кнопка "Нет"
function moveButton() {
    const btnWidth = noBtn.offsetWidth;
    const btnHeight = noBtn.offsetHeight;

    const maxX = window.innerWidth - btnWidth;
    const maxY = window.innerHeight - btnHeight;

    const randomX = Math.random() * maxX;
    const randomY = Math.random() * maxY;

    noBtn.style.left = randomX + "px";
    noBtn.style.top = randomY + "px";
}

// Срабатывает при попытке навести
noBtn.addEventListener("mouseover", moveButton);

// Для телефонов (тап)
noBtn.addEventListener("touchstart", (e) => {
    e.preventDefault();
    moveButton();
});
</script>

</body>
</html>
