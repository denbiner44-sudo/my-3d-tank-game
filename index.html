
<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>DigitalNet Кабинет</title>

<style>

body{
margin:0;
font-family:Arial;
background:#f4f5f7;
}

header{
background:white;
padding:15px 40px;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

.container{
display:flex;
height:90vh;
}

.left{
flex:1;
display:flex;
align-items:center;
justify-content:center;
flex-direction:column;
}

.right{
width:420px;
display:flex;
align-items:center;
justify-content:center;
}

.card{
background:white;
padding:30px;
border-radius:12px;
width:100%;
box-shadow:0 10px 30px rgba(0,0,0,0.15);
}

input{
width:100%;
padding:12px;
margin-top:10px;
border-radius:8px;
border:1px solid #ccc;
}

button{
width:100%;
padding:12px;
margin-top:15px;
border:none;
border-radius:8px;
background:#ff4d00;
color:white;
font-size:16px;
cursor:pointer;
}

.hidden{
display:none;
}

</style>

</head>

<body>

<header>
DigitalNet
</header>

<div class="container">

<div class="left">

<h1>Личный кабинет</h1>
<p>Управление услугами</p>

</div>

<div class="right">

<div class="card">

<h2>Вход по SMS</h2>

<input id="phone" placeholder="Телефон">

<button onclick="sendCode()">Получить код</button>

<div id="codeBlock" class="hidden">

<input id="code" placeholder="Код">

<button onclick="login()">Войти</button>

</div>

</div>

</div>

</div>

<script>

function sendCode(){

let phone=document.getElementById("phone").value

fetch("http://localhost:3000/send-code",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({phone:phone})
})
.then(r=>r.json())
.then(data=>{

alert("Тестовый код: "+data.code)

document.getElementById("codeBlock").classList.remove("hidden")

})

}

function login(){

let phone=document.getElementById("phone").value
let code=document.getElementById("code").value

fetch("http://localhost:3000/login",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
phone:phone,
code:code
})
})
.then(r=>r.json())
.then(data=>{

if(data.status=="success"){

alert("Вход выполнен")

}else{

alert("Неверный код")

}

})

}

</script>

</body>
</html>
