<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>MEGA Hamster GameDev</title>

<style>

body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#1e1b4b,#020617);
color:white;
text-align:center;
}

header{
background:#020617;
padding:15px;
font-size:30px;
}

.top{
display:flex;
justify-content:center;
gap:25px;
padding:10px;
font-size:18px;
}

.hamster{
font-size:120px;
cursor:pointer;
transition:0.1s;
}

.hamster:active{
transform:scale(0.9);
}

.menu button{
padding:10px;
margin:5px;
border:none;
border-radius:8px;
background:#374151;
color:white;
cursor:pointer;
}

.panel{
background:#1f2937;
width:400px;
margin:15px auto;
padding:15px;
border-radius:10px;
}

.action{
background:#22c55e;
padding:10px;
border:none;
border-radius:8px;
cursor:pointer;
margin:5px;
}

.hidden{
display:none;
}

.slot{
font-size:42px;
letter-spacing:8px;
margin:10px;
}

</style>

</head>

<body>

<header>
🐹 MEGA Hamster GameDev
</header>

<div class="top">

💰 <span id="money">0</span>
📈 <span id="income">0</span>/sec
⭐ LVL <span id="level">1</span>

</div>

<div class="hamster" onclick="clickHamster()">🐹</div>

<div class="menu">

<button onclick="tab('games')">🎮 Игры</button>
<button onclick="tab('staff')">👨‍💻 Сотрудники</button>
<button onclick="tab('upgrades')">🏢 Апгрейды</button>
<button onclick="tab('casino')">🎰 Казино</button>
<button onclick="tab('shop')">🛒 Магазин</button>
<button onclick="tab('ach')">🏆 Достижения</button>

</div>

<div id="games" class="panel">

<h3>Разработка игр</h3>

<button class="action" onclick="makeGame(50,5)">Инди</button>
<button class="action" onclick="makeGame(200,20)">Mobile</button>
<button class="action" onclick="makeGame(700,80)">Steam</button>
<button class="action" onclick="makeGame(2000,250)">AAA</button>
<button class="action" onclick="makeGame(10000,1200)">MMO</button>
<button class="action" onclick="makeGame(30000,4000)">Metaverse</button>
<button class="action" onclick="makeGame(100000,12000)">VR Game</button>
<button class="action" onclick="makeGame(500000,70000)">AI Game</button>

</div>

<div id="staff" class="panel hidden">

<h3>Сотрудники</h3>

<button class="action" onclick="buyDev()">👨‍💻 Dev ($300)</button>
<button class="action" onclick="buyDesigner()">🎨 Designer ($500)</button>
<button class="action" onclick="buyMarketing()">📢 Marketing ($800)</button>

<p>

Dev: <span id="devs">0</span><br>
Designers: <span id="designers">0</span><br>
Marketing: <span id="marketers">0</span>

</p>

</div>

<div id="upgrades" class="panel hidden">

<h3>Апгрейды</h3>

<button class="action" onclick="upgrade(2000,80)">💻 ПК</button>
<button class="action" onclick="upgrade(10000,500)">🏢 Офис</button>
<button class="action" onclick="upgrade(50000,2500)">⚙️ Движок</button>
<button class="action" onclick="upgrade(200000,10000)">🤖 AI Dev</button>

</div>

<div id="casino" class="panel hidden">

<h3>🎰 Казино</h3>

<div class="slot" id="slot">❔❔❔</div>

<button class="action" onclick="spin()">Spin ($500)</button>

</div>

<div id="shop" class="panel hidden">

<h3>Магазин</h3>

<button class="action" onclick="buyBoost()">⚡ Boost x2 ($10000)</button>
<button class="action" onclick="buyAuto()">🤖 Auto Click ($20000)</button>

</div>

<div id="ach" class="panel hidden">

<h3>Достижения</h3>

<ul id="achievements"></ul>

</div>

<script>

let money=0
let income=0
let level=1

let devs=0
let designers=0
let marketers=0

let autoClick=false
let boost=1

let achievements=[]

function clickHamster(){

money+=boost*(1+devs)

update()

}

function makeGame(cost,profit){

if(money>=cost){

money-=cost

income+=boost*(profit+devs*3+designers*2+marketers*4)

level++

checkAch()

}

update()

}

function buyDev(){

if(money>=300){

money-=300
devs++
income+=2

}

update()

}

function buyDesigner(){

if(money>=500){

money-=500
designers++
income+=3

}

update()

}

function buyMarketing(){

if(money>=800){

money-=800
marketers++
income+=4

}

update()

}

function upgrade(cost,profit){

if(money>=cost){

money-=cost
income+=profit

}

update()

}

function spin(){

if(money<500)return

money-=500

let items=["💰","💎","🐹","⭐","❌"]

let a=items[Math.floor(Math.random()*5)]
let b=items[Math.floor(Math.random()*5)]
let c=items[Math.floor(Math.random()*5)]

slot.innerText=a+b+c

if(a==b && b==c){

money+=10000

}

update()

}

function buyBoost(){

if(money>=10000){

money-=10000
boost=2

}

}

function buyAuto(){

if(money>=20000){

money-=20000
autoClick=true

}

}

function checkAch(){

if(level==10)addAch("⭐ 10 уровень")
if(level==50)addAch("🏆 50 уровень")
if(money>=100000)addAch("💰 100k денег")

}

function addAch(text){

if(!achievements.includes(text)){

achievements.push(text)

let li=document.createElement("li")
li.innerText=text
document.getElementById("achievements").appendChild(li)

}

}

function update(){

money=Math.floor(money)

moneySpan=document.getElementById("money")
incomeSpan=document.getElementById("income")
levelSpan=document.getElementById("level")

moneySpan.innerText=money
incomeSpan.innerText=income
levelSpan.innerText=level

document.getElementById("devs").innerText=devs
document.getElementById("designers").innerText=designers
document.getElementById("marketers").innerText=marketers

}

setInterval(()=>{

money+=income

if(autoClick){

clickHamster()

}

update()

},1000)

function tab(id){

document.querySelectorAll(".panel").forEach(p=>p.classList.add("hidden"))

document.getElementById(id).classList.remove("hidden")

}

</script>

</body>
</html>
