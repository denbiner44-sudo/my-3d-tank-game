<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Статистика звонков и клиентов</title>
<style>
  body {
    font-family: Arial, sans-serif;
    margin: 0;
    background: #f0f2f5;
    color: #333;
  }
  header {
    background: #1e3a8a;
    color: white;
    padding: 15px 20px;
    text-align: center;
  }
  main {
    padding: 20px;
    max-width: 1400px;
    margin: auto;
  }
  h2 {
    color: #1e3a8a;
  }
  input, select, textarea, button {
    padding: 5px 10px;
    margin: 5px 0;
    width: 100%;
    box-sizing: border-box;
  }
  table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 15px;
  }
  th, td {
    border: 1px solid #ccc;
    padding: 8px;
    text-align: left;
    vertical-align: top;
  }
  th {
    background: #3b82f6;
    color: white;
  }
  section {
    margin-bottom: 30px;
  }
  textarea {
    resize: vertical;
  }
</style>
</head>
<body>

<header>
  <h1>Статистика звонков и клиентов</h1>
</header>

<main>
  <section>
    <h2>Добавить запись</h2>
    <form id="clientForm">
      <label>Участники (через +):</label>
      <input type="text" id="participants" placeholder="Адольф+Амиксол+Кевин">

      <label>Клиент (ФИО):</label>
      <input type="text" id="clientName" placeholder="КАЗАКОВА ЛАРИСА МОДЕСТОВНА">

      <label>Дата рождения:</label>
      <input type="text" id="birthDate" placeholder="09.09.1946">

      <label>Возраст:</label>
      <input type="text" id="age" placeholder="79">

      <label>Документ (Паспорт):</label>
      <input type="text" id="document" placeholder="2503825933">

      <label>Домашний:</label>
      <input type="text" id="homePhone" placeholder="73955562958">

      <label>Сотовый:</label>
      <input type="text" id="cellPhone" placeholder="нет">

      <label>Адрес:</label>
      <input type="text" id="address" placeholder="Иркутская область, г.Ангарск, проспект Ангарский Д.92 КВ.56">

      <label>Кто знает о звонке:</label>
      <input type="text" id="knowsCall" placeholder="Никому">

      <label>Куда обращался после звонка:</label>
      <input type="text" id="afterCall" placeholder="Никуда">

      <label>С кем проживает:</label>
      <input type="text" id="livesWith" placeholder="Сама">

      <label>3-тие лица:</label>
      <input type="text" id="thirdPersons" placeholder="Никого">

      <label>Звонили ли ранее мошенники:</label>
      <input type="text" id="scamBefore" placeholder="Впервые">

      <label>Здоровье:</label>
      <input type="text" id="health" placeholder="Ходит, Видит, Слышит">

      <label>Дополнительная информация:</label>
      <textarea id="additionalInfo" rows="4" placeholder="Приходит соседка, посещала банк..."></textarea>

      <h3>Банк</h3>
      <label>Банк:</label>
      <input type="text" id="bank" placeholder="Сбербанк">

      <label>Адрес банка:</label>
      <input type="text" id="bankAddress" placeholder="Ангарск, 76-й квартал, 1">

      <label>Посещала:</label>
      <input type="text" id="visited" placeholder="Сегодня">

      <label>Доверенность:</label>
      <input type="text" id="powerOfAttorney" placeholder="Нет">

      <label>Книга:</label>
      <input type="text" id="book" placeholder="300к, 150к">

      <h3>Дома</h3>
      <label>Лаве дома:</label>
      <input type="text" id="homeMoney" placeholder="70к">

      <button type="button" onclick="addRecord()">Добавить запись</button>
    </form>
  </section>

  <section>
    <h2>Таблица записей</h2>
    <table>
      <thead>
        <tr>
          <th>#</th>
          <th>Участники</th>
          <th>Клиент</th>
          <th>Дата рождения / Возраст</th>
          <th>Документ</th>
          <th>Телефоны</th>
          <th>Адрес</th>
          <th>Доп. инфо</th>
          <th>Банк</th>
          <th>Дома</th>
          <th>Действие</th>
        </tr>
      </thead>
      <tbody id="recordsTable"></tbody>
    </table>
  </section>
</main>

<script>
  let records = [];

  function addRecord() {
    const record = {
      participants: document.getElementById('participants').value,
      clientName: document.getElementById('clientName').value,
      birthDate: document.getElementById('birthDate').value,
      age: document.getElementById('age').value,
      document: document.getElementById('document').value,
      homePhone: document.getElementById('homePhone').value,
      cellPhone: document.getElementById('cellPhone').value,
      address: document.getElementById('address').value,
      knowsCall: document.getElementById('knowsCall').value,
      afterCall: document.getElementById('afterCall').value,
      livesWith: document.getElementById('livesWith').value,
      thirdPersons: document.getElementById('thirdPersons').value,
      scamBefore: document.getElementById('scamBefore').value,
      health: document.getElementById('health').value,
      additionalInfo: document.getElementById('additionalInfo').value,
      bank: document.getElementById('bank').value,
      bankAddress: document.getElementById('bankAddress').value,
      visited: document.getElementById('visited').value,
      powerOfAttorney: document.getElementById('powerOfAttorney').value,
      book: document.getElementById('book').value,
      homeMoney: document.getElementById('homeMoney').value
    };

    records.push(record);
    document.getElementById('clientForm').reset();
    renderTable();
  }

  function deleteRecord(index) {
    records.splice(index, 1);
    renderTable();
  }

  function renderTable() {
    const tbody = document.getElementById('recordsTable');
    tbody.innerHTML = '';
    records.forEach((r, i) => {
      const row = document.createElement('tr');
      row.innerHTML = `
        <td>${i+1}</td>
        <td>${r.participants}</td>
        <td>${r.clientName}</td>
        <td>${r.birthDate} / ${r.age}</td>
        <td>${r.document}</td>
        <td>Дом: ${r.homePhone}<br>Сот: ${r.cellPhone}</td>
        <td>${r.address}</td>
        <td>${r.additionalInfo}</td>
        <td>${r.bank}<br>${r.bankAddress}<br>Посещала: ${r.visited}<br>Доверенность: ${r.powerOfAttorney}<br>Книга: ${r.book}</td>
        <td>${r.homeMoney}</td>
        <td><button onclick="deleteRecord(${i})">Удалить</button></td>
      `;
      tbody.appendChild(row);
    });
  }
</script>

</body>
</html>
