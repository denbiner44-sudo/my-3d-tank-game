<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Статистика звонков</title>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore.js"></script>

<style>
  body { font-family: Arial, sans-serif; background: #f0f0f0; padding: 20px; }
  h1 { text-align: center; }
  form { margin-bottom: 20px; }
  input, select, textarea, button { display: block; width: 100%; margin: 5px 0; padding: 8px; }
  ul { list-style: none; padding: 0; }
  li { padding: 5px; margin-bottom: 3px; background: #fff; border-radius: 4px; }
</style>
</head>
<body>

<h1>Статистика звонков</h1>

<form id="callForm">
  <input type="text" id="name" placeholder="ФИО" required>
  <input type="text" id="phone" placeholder="Телефон" required>
  <select id="status" required>
    <option value="pending">Не обработан</option>
    <option value="completed">Обработан</option>
    <option value="failed">Не удалось</option>
  </select>
  <textarea id="notes" placeholder="Примечания"></textarea>
  <button type="submit">Добавить</button>
</form>

<ul id="callList"></ul>

<script>
  // Firebase конфиг
  const firebaseConfig = {
    apiKey: "AIzaSyAUFGVs7Q2bH3W8hDGRKSvxjRmR_JmUmXQ",
    authDomain: "nadzor128.firebaseapp.com",
    projectId: "nadzor128",
    storageBucket: "nadzor128.firebasestorage.app",
    messagingSenderId: "53162427347",
    appId: "1:53162427347:web:15f58616d4056aeadb2526",
    measurementId: "G-76B6KZQLKE"
  };

  // Инициализация Firebase
  const app = firebase.initializeApp(firebaseConfig);
  const db = firebase.firestore();

  const form = document.getElementById('callForm');
  const callList = document.getElementById('callList');

  // Добавление звонка в Firestore
  form.addEventListener('submit', e => {
    e.preventDefault();
    const name = document.getElementById('name').value;
    const phone = document.getElementById('phone').value;
    const status = document.getElementById('status').value;
    const notes = document.getElementById('notes').value;

    db.collection('calls').add({ name, phone, status, notes })
      .then(() => form.reset());
  });

  // Отображение звонков в реальном времени
  db.collection('calls').onSnapshot(snapshot => {
    callList.innerHTML = '';
    snapshot.forEach(doc => {
      const data = doc.data();
      let color = data.status === 'completed' ? 'green' :
                  data.status === 'failed' ? 'red' : 'orange';
      callList.innerHTML += `<li style="color:${color}">${data.name} - ${data.phone} - ${data.status} - ${data.notes}</li>`;
    });
  });
</script>

</body>
</html>
