
<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ростелеком — Личный кабинет</title>

<style>

body{
font-family:Arial;
margin:0;
background:#f2f4f8;
}

header{
background:#0d47a1;
color:white;
padding:15px;
font-size:20px;
}

.container{
max-width:900px;
margin:auto;
padding:20px;
}

.card{
background:white;
padding:20px;
border-radius:10px;
margin-bottom:20px;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

input{
width:100%;
padding:10px;
margin-top:10px;
border-radius:5px;
border:1px solid #ccc;
}

button{
margin-top:10px;
padding:10px;
border:none;
background:#0d47a1;
color:white;
border-radius:6px;
cursor:pointer;
}

button:hover{
background:#1565c0;
}

.balance{
font-size:28px;
color:#0d47a1;
}

.menu{
display:flex;
gap:10px;
margin-bottom:15px;
}

.menu button{
flex:1;
}

table{
width:100%;
border-collapse:collapse;
}

td,th{
padding:10px;
border-bottom:1px solid #ddd;
}

.hidden{
display:none;
}

</style>
</head>

<body>

<header>
NetLine — Личный кабинет
</header>

<div class="container">

<!-- LOGIN -->

<div id="login" class="card">

<h3>Вход по номеру</h3>

<input id="phone" placeholder="Введите номер телефона">

<button onclick="sendSMS()">Получить код</button>

<div id="smsBlock" class="hidden">

<input id="code" placeholder="Введите код">

<button onclick="login()">Войти</button>

</div>

</div>


<!-- CABINET -->

<div id="cabinet" class="hidden">

<div class="card">

<h3>Баланс</h3>
<div class="balance" id="balance">120 грн</div>

<button onclick="pay()">Пополнить</button>

</div>

<div class="menu">

<button onclick="showTab('services')">Услуги</button>
<button onclick="showTab('history')">История</button>
<button onclick="logout()">Выход</button>

</div>

<div id="services" class="card">

<h3>Подключенные услуги</h3>

<ul>
<li>Домашний интернет 100 Мбит</li>
<li>IP телевидение</li>
<li>Статический IP</li>
</ul>

</div>

<div id="history" class="card hidden">

<h3>История операций</h3>

<table>

<tr>
<th>Дата</th>
<th>Операция</th>
<th>Сумма</th>
</tr>

<tr>
<td>01.03</td>
<td>Пополнение</td>
<td>+200 грн</td>
</tr>

<tr>
<td>05.03</td>
<td>Списание</td>
<td>-80 грн</td>
</tr>

</table>

</div>

</div>

</div>

<script>

let smsCode="";

function sendSMS(){

let phone=document.getElementById("phone").value;

if(phone.length<5){
alert("Введите номер");
return;
}

smsCode=Math.floor(1000+Math.random()*9000);

alert("Тестовый SMS код: "+smsCode);

document.getElementById("smsBlock").classList.remove("hidden");

}

function login(){

let code=document.getElementById("code").value;

if(code==smsCode){

document.getElementById("login").style.display="none";
document.getElementById("cabinet").classList.remove("hidden");

}else{

alert("Неверный код");

}

}

function showTab(tab){

document.getElementById("services").classList.add("hidden");
document.getElementById("history").classList.add("hidden");

document.getElementById(tab).classList.remove("hidden");

}

function pay(){

let balance=document.getElementById("balance");

let current=parseInt(balance.innerText);

current+=100;

balance.innerText=current+" грн";

alert("Баланс пополнен на 100");

}

function logout(){

location.reload();

}

</script>

</body>
</html>
