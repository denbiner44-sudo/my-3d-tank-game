<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mega Mine Clicker</title>
    <style>
        :root {
            --bg: #1a1a1a;
            --panel: #2d2d2d;
            --accent: #4caf50;
            --text: #ecf0f1;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            /* Анти-зум на рівні браузера */
            touch-action: manipulation;
            overflow: hidden;
        }

        #game-container {
            background: var(--panel);
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0 15px 50px rgba(0,0,0,0.7);
            text-align: center;
            width: 90%;
            max-width: 450px;
            border: 2px solid #444;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 20px;
        }

        .stat-card {
            background: rgba(0,0,0,0.2);
            padding: 10px;
            border-radius: 10px;
        }

        #money { font-size: 1.8rem; color: #f1c40f; display: block; }

        /* Клік-зона */
        #block-container {
            position: relative;
            margin: 30px 0;
        }

        #block {
            width: 160px;
            height: 160px;
            cursor: pointer;
            transition: transform 0.05s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            image-rendering: pixelated;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        /* Ефект при кліку (замість зуму сторінки) */
        #block:active {
            transform: scale(0.92);
        }

        .upgrades-list {
            max-height: 300px;
            overflow-y: auto;
            padding-right: 10px;
        }

        .upgrade-btn {
            background: #34495e;
            border: 1px solid #555;
            color: white;
            padding: 12px;
            margin: 8px 0;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: 0.2s;
        }

        .upgrade-btn:hover:not(:disabled) { background: #3e5871; border-color: var(--accent); }
        .upgrade-btn:disabled { opacity: 0.5; cursor: not-allowed; filter: grayscale(1); }
        
        .price { color: #2ecc71; font-weight: bold; }
        
        /* Смуга досвіду */
        #exp-bar-bg {
            width: 100%;
            height: 10px;
            background: #111;
            border-radius: 5px;
            margin-top: 10px;
        }
        #exp-bar-fill {
            width: 0%;
            height: 100%;
            background: var(--accent);
            border-radius: 5px;
            transition: width 0.3s;
        }
    </style>
</head>
<body>

    <div id="game-container">
        <h2>⛏️ Mine Tycoon <span id="level-tag">Lvl. 1</span></h2>
        
        <div id="exp-bar-bg"><div id="exp-bar-fill"></div></div>

        <div class="stats-grid">
            <div class="stat-card">💎 Баланс: <span id="money">0</span></div>
            <div class="stat-card">⚡ Прибуток: <br><small id="income-info">Клік: 1 | Авто: 0</small></div>
        </div>

        <div id="block-container">
            <svg id="block" viewBox="0 0 100 100" onclick="mine()">
                <rect width="100" height="100" fill="#4d3319"/>
                <rect width="100" height="25" fill="#2d933c"/>
                <rect x="20" y="40" width="15" height="15" fill="#888"/>
                <rect x="60" y="60" width="15" height="15" fill="#888"/>
            </svg>
        </div>

        <div class="upgrades-list">
            <button class="upgrade-btn" id="btn-click" onclick="buy('click')">
                <span>🦾 Сила кліку (+1)</span>
                <span class="price" id="p-click">20</span>
            </button>
            <button class="upgrade-btn" id="btn-slave" onclick="buy('slave')">
                <span>👷 Найняти нуба (+2/с)</span>
                <span class="price" id="p-slave">100</span>
            </button>
            <button class="upgrade-btn" id="btn-drill" onclick="buy('drill')">
                <span>🚜 Бурова машина (+15/с)</span>
                <span class="price" id="p-drill">800</span>
            </button>
            <button class="upgrade-btn" id="btn-tnt" onclick="buy('tnt')">
                <span>🧨 Динаміт (+50/с)</span>
                <span class="price" id="p-tnt">3000</span>
            </button>
            <button class="upgrade-btn" id="btn-quarry" onclick="buy('quarry')">
                <span>🏰 Кар'єр (+200/с)</span>
                <span class="price" id="p-quarry">15000</span>
            </button>
        </div>
    </div>

    <script>
        let state = {
            money: 0,
            clickVal: 1,
            autoVal: 0,
            lvl: 1,
            exp: 0,
            upgrades: {
                click: { price: 20, inc: 1, mult: 1.4 },
                slave: { price: 100, inc: 2, mult: 1.5 },
                drill: { price: 800, inc: 15, mult: 1.6 },
                tnt: { price: 3000, inc: 50, mult: 1.7 },
                quarry: { price: 15000, inc: 200, mult: 1.8 }
            }
        };

        function mine() {
            state.money += state.clickVal;
            state.exp += 1;
            checkLevel();
            updateUI();
        }

        function checkLevel() {
            let nextLvl = state.lvl * 100;
            if (state.exp >= nextLvl) {
                state.exp = 0;
                state.lvl++;
                state.money += state.lvl * 50; // Бонус за рівень
                alert("Новий рівень: " + state.lvl + "! Отримано бонус 💎");
            }
            document.getElementById('exp-bar-fill').style.width = (state.exp / nextLvl * 100) + "%";
        }

        function buy(id) {
            let upg = state.upgrades[id];
            if (state.money >= upg.price) {
                state.money -= upg.price;
                if (id === 'click') {
                    state.clickVal += upg.inc;
                } else {
                    state.autoVal += upg.inc;
                }
                upg.price = Math.floor(upg.price * upg.mult);
                updateUI();
            }
        }

        function updateUI() {
            document.getElementById('money').innerText = Math.floor(state.money);
            document.getElementById('level-tag').innerText = `Lvl. ${state.lvl}`;
            document.getElementById('income-info').innerText = `Клік: ${state.clickVal} | Авто: ${state.autoVal}/с`;
            
            for (let key in state.upgrades) {
                let btn = document.getElementById('btn-' + key);
                let priceLabel = document.getElementById('p-' + key);
                priceLabel.innerText = state.upgrades[key].price;
                btn.disabled = state.money < state.upgrades[key].price;
            }
        }

        // Авто-видобуток
        setInterval(() => {
            if (state.autoVal > 0) {
                state.money += state.autoVal / 10;
                updateUI();
            }
        }, 100);

        // Блокування подвійного кліку (зуму) на смартфонах
        document.addEventListener('dblclick', function(e) {
            e.preventDefault();
        }, { passive: false });

    </script>
</body>
</html>
