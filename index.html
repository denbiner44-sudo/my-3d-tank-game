<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Cyber Security Center</title>

<style>

body{
margin:0;
font-family:monospace;
background:#020617;
color:#00ff9c;
}

/* LOGIN */

#loginPage{
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.loginBox{
border:1px solid #00ff9c;
padding:30px;
background:#010409;
width:300px;
text-align:center;
}

input{
width:100%;
padding:10px;
margin:10px 0;
background:black;
border:1px solid #00ff9c;
color:#00ff9c;
}

button{
width:100%;
padding:10px;
background:#001b14;
border:1px solid #00ff9c;
color:#00ff9c;
cursor:pointer;
}

/* PANEL */

#panel{
display:none;
}

header{
background:#020617;
padding:15px;
text-align:center;
font-size:22px;
border-bottom:1px solid #00ff9c;
}

.container{
display:grid;
grid-template-columns:250px 1fr;
height:100vh;
}

.sidebar{
background:#010409;
border-right:1px solid #00ff9c;
padding:15px;
}

.sidebar button{
margin-bottom:10px;
}

.main{
padding:20px;
overflow:auto;
}

.card{
border:1px solid #00ff9c;
padding:15px;
margin-bottom:15px;
background:#010409;
}

#terminal{
height:250px;
overflow:auto;
background:black;
padding:10px;
border:1px solid #00ff9c;
}

#cmd{
width:100%;
padding:10px;
background:black;
border:1px solid #00ff9c;
color:#00ff9c;
margin-top:10px;
}

</style>
</head>

<body>

<!-- LOGIN -->

<div id="loginPage">

<div class="loginBox">

<h2>Cyber Security Login</h2>

<input id="login" placeholder="Login">
<input id="password" type="password" placeholder="Password">

<button onclick="login()">Enter</button>

<p id="error"></p>

</div>

</div>

<!-- PANEL -->

<div id="panel">

<header>
CYBER SECURITY CENTER
</header>

<div class="container">

<div class="sidebar">

<button onclick="scanPorts()">Scan Ports</button>
<button onclick="simulateAttack()">Simulate Attack</button>
<button onclick="systemCheck()">System Check</button>
<button onclick="clearTerminal()">Clear Terminal</button>

</div>

<div class="main">

<div class="card">

<h3>System Status</h3>

<div>Firewall: ACTIVE</div>
<div>Threats blocked: <span id="threats">0</span></div>
<div>Status: SECURE</div>

</div>

<div class="card">

<h3>Security Terminal</h3>

<div id="terminal"></div>

<input id="cmd" placeholder="Введите команду">

</div>

</div>

</div>

</div>

<script>

/* LOGIN */

function login(){

let l=document.getElementById("login").value
let p=document.getElementById("password").value

if(l==="admin" && p==="cyber123"){

document.getElementById("loginPage").style.display="none"
document.getElementById("panel").style.display="block"

}

else{

document.getElementById("error").innerText="Неверный логин или пароль"

}

}

/* TERMINAL */

let terminal=document.getElementById("terminal")

function log(text){

let div=document.createElement("div")
div.innerText=text
terminal.appendChild(div)

terminal.scrollTop=terminal.scrollHeight

}

/* FUNCTIONS */

function scanPorts(){

log("Scanning ports...")

setTimeout(()=>log("21 FTP CLOSED"),500)
setTimeout(()=>log("22 SSH OPEN"),1000)
setTimeout(()=>log("80 HTTP OPEN"),1500)
setTimeout(()=>log("443 HTTPS OPEN"),2000)

}

function systemCheck(){

log("Firewall: ACTIVE")
log("Antivirus: ACTIVE")
log("System secure")

}

function simulateAttack(){

let threats=document.getElementById("threats")

let count=parseInt(threats.innerText)

let interval=setInterval(()=>{

count++
threats.innerText=count

log("Blocked attack from IP: 185."+Math.floor(Math.random()*255)+"."+Math.floor(Math.random()*255)+"."+Math.floor(Math.random()*255))

if(count>10) clearInterval(interval)

},600)

}

function clearTerminal(){
terminal.innerHTML=""
}

/* COMMANDS */

document.addEventListener("keydown",function(e){

let cmdInput=document.getElementById("cmd")

if(e.key==="Enter" && document.activeElement===cmdInput){

let cmd=cmdInput.value

log("> "+cmd)

if(cmd==="scan") scanPorts()

else if(cmd==="status") systemCheck()

else if(cmd==="attack") simulateAttack()

else if(cmd==="help"){

log("Commands:")
log("scan")
log("status")
log("attack")

}

else log("Unknown command")

cmdInput.value=""

}

})

</script>

</body>
</html>
