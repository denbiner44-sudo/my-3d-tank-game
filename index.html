<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Crypto Mining Dashboard</title>

<style>

body{
margin:0;
font-family:Arial;
background:#0b0f1a;
color:#00ff9c;
}

header{
display:flex;
justify-content:space-between;
padding:20px;
background:#050814;
border-bottom:1px solid #00ff9c;
}

.container{
display:grid;
grid-template-columns:250px 1fr 300px;
height:calc(100vh - 70px);
}

.sidebar{
background:#050814;
border-right:1px solid #00ff9c;
padding:20px;
}

.sidebar button{
width:100%;
padding:12px;
margin-bottom:10px;
background:#001b14;
border:1px solid #00ff9c;
color:#00ff9c;
cursor:pointer;
}

.main{
padding:20px;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
}

.mineButton{
width:200px;
height:200px;
border-radius:50%;
font-size:26px;
background:#001b14;
border:3px solid #00ff9c;
color:#00ff9c;
cursor:pointer;
transition:0.2s;
}

.mineButton:active{
transform:scale(0.9);
}

.stats{
display:flex;
gap:20px;
margin-bottom:40px;
}

.stat{
background:#050814;
border:1px solid #00ff9c;
padding:20px;
min-width:150px;
text-align:center;
}

.terminal{
background:black;
color:#00ff9c;
padding:15px;
height:200px;
overflow:auto;
border:1px solid #00ff9c;
width:100%;
}

.upgrades{
background:#050814;
border-left:1px solid #00ff9c;
padding:20px;
}

.upgrades button{
width:100%;
margin-bottom:10px;
padding:10px;
background:#001b14;
border:1px solid #00ff9c;
color:#00ff9c;
cursor:pointer;
}

.price{
color:#ffcc00;
font-weight:bold;
}

</style>
</head>

<body>

<header>

<h1>CRYPTO MINING DASHBOARD</h1>

<div>
Coins: <span id="coins">0</span> |
Price: $<span id="price">1</span>
</div>

</header>

<div class="container">

<div class="sidebar">

<button onclick="log('Opening miner panel')">Miner</button>
<button onclick="log('Viewing statistics')">Statistics</button>
<button onclick="log('Server monitoring')">Servers</button>
<button onclick="log('Security check')">Security</button>

</div>

<div class="main">

<div class="stats">

<div class="stat">
<h3>Coins</h3>
<span id="coinStat">0</span>
</div>

<div class="stat">
<h3>Coins/sec</h3>
<span id="cps">0</span>
</div>

<div class="stat">
<h3>Level</h3>
<span id="level">1</span>
</div>

</div>

<button class="mineButton" id="mineButton">
MINE
</button>

<br><br>

<div class="terminal" id="terminal"></div>

</div>

<div class="upgrades">

<h3>UPGRADES</h3>

<button onclick="upgradeClick()">
CPU Upgrade (+1 click) — 50
</button>

<button onclick="upgradeGPU()">
GPU Boost (+1/sec) — 100
</button>

<button onclick="upgradeQuantum()">
Quantum Miner (+5/sec) — 500
</button>

<button onclick="upgradeFarm()">
Mining Farm (+20/sec) — 2000
</button>

<button onclick="buyServer()">
Buy Server (+50/sec) — 10000
</button>

</div>

</div>

<script>

let coins=0
let clickPower=1
let coinsPerSec=0
let level=1
let price=1

let terminal=document.getElementById("terminal")

function log(t){

let div=document.createElement("div")
div.innerText="> "+t
terminal.appendChild(div)
terminal.scrollTop=terminal.scrollHeight

}

document.getElementById("mineButton").onclick=function(){

coins+=clickPower

update()

log("Mined "+clickPower+" coins")

}

function upgradeClick(){

if(coins>=50){

coins-=50
clickPower++

log("CPU upgraded")

update()

}

}

function upgradeGPU(){

if(coins>=100){

coins-=100
coinsPerSec++

log("GPU installed")

update()

}

}

function upgradeQuantum(){

if(coins>=500){

coins-=500
coinsPerSec+=5

log("Quantum miner activated")

update()

}

}

function upgradeFarm(){

if(coins>=2000){

coins-=2000
coinsPerSec+=20

log("Mining farm started")

update()

}

}

function buyServer(){

if(coins>=10000){

coins-=10000
coinsPerSec+=50

log("New server purchased")

update()

}

}

function update(){

document.getElementById("coins").innerText=coins
document.getElementById("coinStat").innerText=coins
document.getElementById("cps").innerText=coinsPerSec
document.getElementById("level").innerText=level
document.getElementById("price").innerText=price

localStorage.setItem("cryptoSave",JSON.stringify({
coins,clickPower,coinsPerSec,level
}))

}

setInterval(function(){

coins+=coinsPerSec
update()

},1000)

setInterval(function(){

price=(Math.random()*10+1).toFixed(2)
document.getElementById("price").innerText=price

},5000)

let save=localStorage.getItem("cryptoSave")

if(save){

let data=JSON.parse(save)

coins=data.coins
clickPower=data.clickPower
coinsPerSec=data.coinsPerSec
level=data.level

update()

}

</script>

</body>
</html>
