<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Super Hamster GameDev</title>

<style>

body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#1e1b4b,#312e81);
color:white;
text-align:center;
}

header{
background:#0f172a;
padding:15px;
font-size:28px;
}

.stats{
display:flex;
justify-content:center;
gap:20px;
padding:10px;
font-size:18px;
}

.hamster{
font-size:100px;
cursor:pointer;
}

.panel{
background:#1f2937;
width:360px;
margin:10px auto;
padding:15px;
border-radius:10px;
}

button{
padding:10px;
margin:5px;
border:none;
border-radius:8px;
cursor:pointer;
background:#22c55e;
color:white;
}

button:hover{
background:#16a34a;
}

.hidden{
display:none;
}

.slot{
font-size:40px;
letter-spacing:10px;
margin:10px;
}

</style>
</head>

<body>

<header>
🐹 Super Hamster GameDev
</header>

<div class="stats">
💰 <span id="money">0</span>
📈 <span id="income">0</span>/sec
⭐ LVL <span id="level">1</span>
</div>

<div class="hamster" onclick="clickHamster()">🐹</div>

<div>

<button onclick="show('games')">🎮 Игры</button>
<button onclick="show('staff')">👨‍💻 Сотрудники</button>
<button onclick="show('upgrades')">🏢 Апгрейды</button>
<button onclick="show('slots')">🎰 Слоты</button>
<button onclick="show('stats')">📊 Статистика</button>

</div>

<div id="games" class="panel">

<h3>Создание игр</h3>

<button onclick="game(50,5)">Инди игра ($50)</button>
<button onclick="game(200,20)">Мобильная ($200)</button>
<button onclick="game(500,60)">Steam игра ($500)</button>
<button onclick="game(2000,200)">AAA ($2000)</button>

</div>

<div id="staff" class="panel hidden">

<h3>Сотрудники</h3>

<button onclick="buyDev()">👨‍💻 Разработчик ($300)</button>
<button onclick="buyDesigner()">🎨 Дизайнер ($500)</button>
<button onclick="buyMarketing()">📢 Маркетинг ($700)</button>

</div>

<div id="upgrades" class="panel hidden">

<h3>Апгрейды</h3>

<button onclick="upgrade(1000,50)">💻 ПК ($1000)</button>
<button onclick="upgrade(3000,150)">🏢 Офис ($3000)</button>
<button onclick="upgrade(10000,500)">⚙️ Движок ($10000)</button>

</div>

<div id="slots" class="panel hidden">

<h3>🎰 Слоты</h3>

<div class="slot" id="slot">❔❔❔</div>

<button onclick="spin()">Крутить ($100)</button>

</div>

<div id="stats" class="panel hidden">

<p>Игры: <span id="gamesMade">0</span></p>
<p>Разработчики: <span id="devs">0</span></p>
<p>Дизайнеры: <span id="designers">0</span></p>
<p>Маркетологи: <span id="marketers">0</span></p>

</div>

<script>

let money=0
let income=0
let level=1

let devs=0
let designers=0
let marketers=0

let gamesMade=0

function clickHamster(){

money+=1+devs
update()

}

function game(cost,profit){

if(money>=cost){

money-=cost
income+=profit+devs*2+designers
gamesMade++

}

update()

}

function buyDev(){

if(money>=300){

money-=300
devs++
income+=2

}

update()

}

function buyDesigner(){

if(money>=500){

money-=500
designers++
income+=3

}

update()

}

function buyMarketing(){

if(money>=700){

money-=700
marketers++
income+=5

}

update()

}

function upgrade(cost,profit){

if(money>=cost){

money-=cost
income+=profit
level++

}

update()

}

function spin(){

if(money<100) return

money-=100

let items=["💰","💎","🐹","❌"]

let a=items[Math.floor(Math.random()*items.length)]
let b=items[Math.floor(Math.random()*items.length)]
let c=items[Math.floor(Math.random()*items.length)]

document.getElementById("slot").innerText=a+b+c

if(a==b && b==c){

money+=1000

}

update()

}

function update(){

document.getElementById("money").innerText=Math.floor(money)
document.getElementById("income").innerText=income
document.getElementById("level").innerText=level

document.getElementById("gamesMade").innerText=gamesMade
document.getElementById("devs").innerText=devs
document.getElementById("designers").innerText=designers
document.getElementById("marketers").innerText=marketers

}

setInterval(()=>{

money+=income
update()

},1000)

function show(id){

document.querySelectorAll(".panel").forEach(p=>p.classList.add("hidden"))

document.getElementById(id).classList.remove("hidden")

}

</script>

</body>
</html>
