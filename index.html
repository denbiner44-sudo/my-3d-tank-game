<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Cyber Security Center</title>

<style>

body{
margin:0;
font-family:monospace;
background:#020617;
color:#00ff9c;
}

header{
background:#020617;
padding:15px;
text-align:center;
font-size:24px;
border-bottom:1px solid #00ff9c;
}

.container{
display:grid;
grid-template-columns:250px 1fr;
height:100vh;
}

.sidebar{
background:#010409;
border-right:1px solid #00ff9c;
padding:15px;
}

.sidebar button{
width:100%;
margin-bottom:10px;
padding:10px;
background:#001b14;
border:1px solid #00ff9c;
color:#00ff9c;
cursor:pointer;
}

.sidebar button:hover{
background:#003b2c;
}

.main{
padding:20px;
overflow:auto;
}

.card{
border:1px solid #00ff9c;
padding:15px;
margin-bottom:15px;
background:#010409;
}

#terminal{
height:250px;
overflow:auto;
background:black;
padding:10px;
border:1px solid #00ff9c;
}

#cmd{
width:100%;
padding:10px;
background:black;
border:1px solid #00ff9c;
color:#00ff9c;
margin-top:10px;
}

canvas{
background:black;
width:100%;
height:300px;
border:1px solid #00ff9c;
}

.stat{
font-size:18px;
margin:5px 0;
}

</style>
</head>

<body>

<header>
CYBER SECURITY CENTER
</header>

<div class="container">

<div class="sidebar">

<button onclick="scanPorts()">Скан портов</button>
<button onclick="checkPassword()">Проверить пароль</button>
<button onclick="simulateAttack()">Симуляция атак</button>
<button onclick="systemCheck()">Проверка системы</button>
<button onclick="clearTerminal()">Очистить терминал</button>

</div>

<div class="main">

<div class="card">

<h3>Мониторинг системы</h3>

<div class="stat">Firewall: <span id="fw">ACTIVE</span></div>
<div class="stat">Threats blocked: <span id="threats">0</span></div>
<div class="stat">System status: <span id="status">Secure</span></div>

</div>

<div class="card">

<h3>Терминал безопасности</h3>

<div id="terminal"></div>

<input id="cmd" placeholder="Введите команду">

</div>

<div class="card">

<h3>Карта атак (симуляция)</h3>

<canvas id="map"></canvas>

</div>

</div>

</div>

<script>

let terminal=document.getElementById("terminal")

function log(text){

let div=document.createElement("div")
div.innerText=text
terminal.appendChild(div)
terminal.scrollTop=terminal.scrollHeight

}

function scanPorts(){

log("Scanning ports...")

setTimeout(()=>log("21 FTP CLOSED"),500)
setTimeout(()=>log("22 SSH OPEN"),1000)
setTimeout(()=>log("80 HTTP OPEN"),1500)
setTimeout(()=>log("443 HTTPS OPEN"),2000)
setTimeout(()=>log("Scan complete"),2500)

}

function checkPassword(){

let pass=prompt("Введите пароль")

if(!pass) return

let score=0

if(pass.length>8) score++
if(/[A-Z]/.test(pass)) score++
if(/[0-9]/.test(pass)) score++
if(/[^A-Za-z0-9]/.test(pass)) score++

if(score<=1) log("Weak password ❌")
else if(score==2) log("Medium password ⚠️")
else log("Strong password ✅")

}

function systemCheck(){

log("Checking firewall...")
setTimeout(()=>log("Firewall active"),1000)

setTimeout(()=>log("Antivirus active"),1500)

setTimeout(()=>log("No threats detected"),2000)

}

function simulateAttack(){

log("Simulating cyber attack...")

let threats=document.getElementById("threats")

let count=parseInt(threats.innerText)

let interval=setInterval(()=>{

count++
threats.innerText=count

log("Attack blocked from IP: 185."+Math.floor(Math.random()*255)+"."+Math.floor(Math.random()*255)+"."+Math.floor(Math.random()*255))

if(count>10) clearInterval(interval)

},700)

}

function clearTerminal(){
terminal.innerHTML=""
}

document.getElementById("cmd").addEventListener("keydown",function(e){

if(e.key==="Enter"){

let cmd=this.value

log("> "+cmd)

if(cmd==="help"){

log("Commands:")
log("scan - scan ports")
log("status - system status")
log("attack - simulate attack")

}

else if(cmd==="scan") scanPorts()

else if(cmd==="status") systemCheck()

else if(cmd==="attack") simulateAttack()

else log("Unknown command")

this.value=""

}

})

log("Cyber Security Console started")
log("Type help")

let canvas=document.getElementById("map")
let ctx=canvas.getContext("2d")

canvas.width=canvas.offsetWidth
canvas.height=300

function drawAttack(){

let x=Math.random()*canvas.width
let y=Math.random()*canvas.height

ctx.fillStyle="red"
ctx.beginPath()
ctx.arc(x,y,3,0,Math.PI*2)
ctx.fill()

}

setInterval(drawAttack,300)

</script>

</body>
</html>
