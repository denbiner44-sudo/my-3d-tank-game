<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Слот 5x3 PRO</title>
<style>
body {
    margin:0;
    font-family: Arial, sans-serif;
    background: #0f172a;
    color: white;
    display:flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    min-height:100vh;
    padding: 20px;
}
h1 { margin-bottom: 10px; text-align:center; }
.slot-container {
    display: grid;
    grid-template-columns: repeat(5, 80px);
    grid-template-rows: repeat(3, 80px);
    gap: 5px;
    margin-bottom: 20px;
}
.cell {
    width: 80px;
    height: 80px;
    background: #1e293b;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size: 32px;
    border-radius: 8px;
    transition: 0.2s;
}
.controls {
    display: flex;
    gap: 15px;
    margin-bottom: 10px;
    flex-wrap: wrap;
}
button {
    padding: 8px 15px;
    border:none;
    border-radius: 5px;
    cursor:pointer;
    font-size:16px;
    background: #fbbf24;
    color:#111827;
    font-weight:bold;
    transition: 0.2s;
}
button:hover { background: #facc15; }
select, input {
    padding: 5px 10px;
    border-radius:5px;
    border:none;
    font-size:16px;
}
.info { margin-top: 10px; text-align:center; font-size:18px; }
.bonus { color:#22c55e; font-weight:bold; }
</style>
</head>
<body>

<h1>🎰 Слот 5x3 PRO</h1>

<div class="slot-container" id="slot">
    <!-- Ячейки слота -->
</div>

<div class="controls">
    <label>Ставка:
        <input type="number" id="bet" value="10" min="1">
    </label>
    <label>Линий:
        <select id="lines">
            <option value="1">1</option>
            <option value="3" selected>3</option>
            <option value="5">5</option>
            <option value="10">10</option>
        </select>
    </label>
    <button id="spin">Вращать</button>
</div>

<div class="info" id="message"></div>
<div class="info">Баланс: <span id="balance">1000</span></div>

<script>
const symbols = ["🍒","🍋","🍊","🍉","⭐","💎","🤑"]; // символы
const rows = 3;
const cols = 5;
let balance = 1000;
let freeSpins = 0;
let multiplier = 1;

// Создаем слот
const slotContainer = document.getElementById("slot");
function createSlot() {
    slotContainer.innerHTML = '';
    for(let i=0;i<rows*cols;i++){
        const cell = document.createElement('div');
        cell.className = 'cell';
        cell.textContent = symbols[Math.floor(Math.random()*symbols.length)];
        slotContainer.appendChild(cell);
    }
}
createSlot();

// Анимация вращения барабана
function spinSlot() {
    const bet = parseInt(document.getElementById("bet").value);
    const lines = parseInt(document.getElementById("lines").value);

    if(freeSpins>0){
        document.getElementById("message").textContent = `🎁 Бесплатный спин!`;
    } else {
        if(bet>balance){
            alert("Недостаточно баланса!");
            return;
        }
        balance -= bet;
        document.getElementById("balance").textContent = balance;
    }

    const cells = slotContainer.children;
    // Анимация вращения
    for(let c=0;c<cols;c++){
        for(let r=0;r<rows;r++){
            const cellIndex = r*cols + c;
            for(let t=0;t<10;t++){
                setTimeout(()=>{
                    cells[cellIndex].textContent = symbols[Math.floor(Math.random()*symbols.length)];
                }, t*50 + c*100);
            }
        }
    }

    // Проверка выигрыша после анимации
    setTimeout(()=>{
        let win = 0;
        for(let r=0;r<lines;r++){
            const lineSymbols = [];
            for(let c=0;c<cols;c++){
                lineSymbols.push(cells[r*cols+c].textContent);
            }
            if(lineSymbols.every(s=>s===lineSymbols[0])){
                const lineWin = bet*5*multiplier;
                win += lineWin;
                for(let c=0;c<cols;c++){
                    cells[r*cols+c].style.background = '#22c55e';
                }
                setTimeout(()=> {
                    for(let c=0;c<cols;c++){
                        cells[r*cols+c].style.background = '#1e293b';
                    }
                }, 1000);
            }
        }

        // Случайные бонусы
        const rand = Math.random();
        if(rand<0.05){ // 5% шанс фриспинов
            freeSpins += 3;
            document.getElementById("message").innerHTML = `<span class="bonus">🎉 3 бесплатных спина!</span>`;
        } else if(rand<0.15){ // 10% шанс множителя
            multiplier = 2;
            document.getElementById("message").innerHTML = `<span class="bonus">🔥 Множитель x2 активирован!</span>`;
        } else if(win>0){
            document.getElementById("message").textContent = `Выигрыш: ${win}`;
        } else {
            document.getElementById("message").textContent = "Попробуйте ещё!";
        }

        balance += win;
        document.getElementById("balance").textContent = balance;

        if(freeSpins>0){
            freeSpins--;
        } else {
            multiplier = 1;
        }
    }, 1000);
}

document.getElementById("spin").addEventListener('click', spinSlot);
</script>

</body>
</html>
